<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Carte des Yvelines</title>
<link href="https://unpkg.com/leaflet/dist/leaflet.css" rel="stylesheet"/>
<style>
  html, body { margin:0; padding:0; height:100%; }
  #map { width:100%; height:100%; }
  #search {
    position:absolute; top:calc(100vh/12); left:50%; transform:translateX(-50%);
    width:360px; max-width:85%; padding:12px 14px;
    font-family:Helvetica,sans-serif; font-size:20px;
    border:2px solid #ccc; border-radius:25px;
    box-shadow:0 2px 6px rgba(0,0,0,0.15); z-index:1000;
  }
  #suggestions {
    position:absolute; top:calc(100vh/12 + 52px); left:50%; transform:translateX(-50%);
    width:360px; max-width:85%; background:white;
    border:1px solid #ccc; border-radius:8px;
    max-height:150px; overflow-y:auto;
    box-shadow:0 2px 6px rgba(0,0,0,0.15); z-index:1000;
  }
  .suggestion { padding:8px 12px; cursor:pointer; font-family:Helvetica,sans-serif; font-size:20px; }
  .suggestion:hover { background:#f0f0f0; }

  #info {
    background:#fff !important; opacity:1 !important; backdrop-filter:none;
    display:none; position:absolute; top:30%; left:5%;
    width:45%; max-width:600px; border-radius:12px;
    box-shadow:0 4px 16px rgba(0,0,0,0.18); padding:16px 20px;
    font-family:Helvetica,sans-serif; font-size:15px; color:black;
    z-index:1000; max-height:65%; overflow-y:auto;
  }
  #info .info-header { margin:0 0 8px 0; font-size:22px; font-weight:bold; }
  #info .info-subtitle { margin:0 0 14px 0; font-size:16px; font-weight:bold; }
  #info .info-list { list-style:none; padding:0; margin:0; }
  #info .info-list li { margin:16px 0; font-size:22px; white-space:nowrap; }
  #info .info-list li.hors { color:red; font-weight:bold; }
  #info hr { margin:16px 0; border:none; border-top:1px solid #ccc; }
  #logo { position:absolute; top:40px; right:40px; width:120px; z-index:1001; pointer-events:none; }

  #reglages-btn {
    position:absolute; top:40px; left:40px; z-index:1001;
    background:#fff; color:#1d1d1d; text-decoration:none;
    font-family:Helvetica,sans-serif; font-size:15px; font-weight:bold;
    padding:10px 16px; border-radius:22px; box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }

  .info-btn-row { margin-top:36px; display:flex; justify-content:center; gap:18px; flex-wrap:wrap; margin-bottom:14px; }
  .info-btn-row a { font-size:21px !important; padding:12px 24px !important; border-radius:27px !important; }

  #consigne-fixe {
    position:fixed; bottom:28px; right:34px; width:350px; background:#fff;
    border-radius:14px; box-shadow:0 6px 24px rgba(0,0,0,0.14); padding:24px 20px 20px 24px;
    font-family:Helvetica,Arial,sans-serif; font-size:16px; color:#222; z-index:2001;
    display:flex; flex-direction:column; gap:15px; border:1.2px solid #e0e0e0;
  }
  #consigne-fixe .pro { color:#dc3545; font-weight:bold; font-size:18px; margin-bottom:4px; }
  #consigne-fixe .paiement { color:#222; font-weight:bold; font-size:16px; margin-bottom:2px; }
  #consigne-fixe .infos { font-weight:normal; color:#222; font-size:15px; margin-bottom:2px; }

  @media (max-width:700px) {
    #consigne-fixe { width:230px; right:2vw; padding:12px 10px; font-size:11px; gap:8px; }
    #consigne-fixe .pro { font-size:12px; }
    #consigne-fixe .paiement { font-size:11px; }
    #consigne-fixe .infos { font-size:10px; }
    #info { width:90%; left:5%; font-size:14px; }
    #info .info-list li { font-size:18px; white-space:normal; }
    #logo { width:70px; top:14px; right:14px; }
    #reglages-btn { top:14px; left:14px; font-size:13px; padding:8px 12px; }
    .info-btn-row { flex-direction:column; align-items:center; gap:11px; }
    .info-btn-row a { font-size:16px !important; padding:10px 18px !important; border-radius:22px !important; min-width:140px; max-width:90%; text-align:center !important; margin:0 auto !important; display:block !important; }
  }
</style>
</head>
<body>
<a href="reglages.html" id="reglages-btn">⚙ Réglages</a>
<img alt="Logo" id="logo" src="image.png"/>
<input autocomplete="off" id="search" placeholder="Rechercher une commune" type="text"/>
<div id="suggestions"></div>
<div id="info"></div>
<div id="map"></div>

<div id="consigne-fixe">
  <div class="pro">À demander si PROFESSIONNEL</div>
  <div class="paiement">Paiement sur place = tarif TTC affiché +20 €</div>
  <div class="paiement">Paiement 30 jours nets = tarif TTC affiché +40 €</div>
  <div class="infos">Règlement Chèque accepté pour les pros</div>
  <div class="infos">Toujours donner ensuite le tarif Hors Taxes = Tarif TTC / 1,2</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="data.js"></script>
<script>
const colorMap = { vert:'#28a745', jaune:'#ffc107', orange:'#fd7e14', rouge:'#dc3545', bleue:'#007bff' };
const communesCCHVC = [
  "Chevreuse","Choisel","Dampierre-En-Yvelines","Le Mesnil-Saint-Denis","Lévis-Saint-Nom",
  "Milon-La-Chapelle","Saint-Forget","Saint-Lambert-Des-Bois","Saint-Rémy-Lès-Chevreuse","Senlisse"
];

// Données issues de data.js (structure par zone)
const communesData = DGF_DATA.communes;
const LABELS = DGF_DATA.labels;
const GRILLES = DGF_DATA.grilles;
const EXCEPTIONS = DGF_DATA.exceptions || {};

// Construit la table de tarifs effective d'une commune (exception > grille de zone)
function tarifsDe(c){
  const prix = EXCEPTIONS[c.commune] ? EXCEPTIONS[c.commune] : GRILLES[c.color];
  const t = {};
  LABELS.forEach((lab,i)=>{ t[lab] = prix[i]; });
  return t;
}

var map = L.map('map').setView([48.8566,2.0474],9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{ attribution:'© OpenStreetMap contributors' }).addTo(map);
var logoIcon = L.icon({ iconUrl:'image.png', iconSize:[80,80], iconAnchor:[40,80] });
var marker, infoPanel=document.getElementById('info');

function normalize(s){ return s.normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[-' ]/g,'').toLowerCase(); }

document.getElementById('search').addEventListener('input',function(){
  var val=normalize(this.value), box=document.getElementById('suggestions');
  box.innerHTML=''; if(!val) return;
  communesData.filter(c=>normalize(c.commune).startsWith(val)).slice(0,10).forEach(c=>{
    var d=document.createElement('div');
    d.className='suggestion'; d.textContent=c.commune;
    d.onclick=function(){ selectCommune(c); box.innerHTML=''; document.getElementById('search').value=c.commune; };
    box.appendChild(d);
  });
});
document.getElementById('search').addEventListener('keydown', function(e) {
  if(e.key === 'Enter') {
    var val = normalize(this.value);
    var commune = communesData.find(c => normalize(c.commune) === val) || communesData.find(c => normalize(c.commune).startsWith(val));
    if(commune) { selectCommune(commune); document.getElementById('suggestions').innerHTML = ''; }
  }
});
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

function selectCommune(c){
  if(marker) map.removeLayer(marker);
  marker = L.marker([c.lat,c.lon],{icon:logoIcon}).addTo(map);
  map.setView([c.lat,c.lon],13);
  infoPanel.style.display='block';
  var tarifs = tarifsDe(c);

  let subvention = '';
  if(communesCCHVC.map(x=>x.toLowerCase()).includes(c.commune.toLowerCase())) {
    subvention = '<span style="color:#388e3c;font-weight:bold;font-size:16px;"> – (subvention CCHVC frelon asiatique)</span>';
  }
  let zn = cap(c.color);
  let zoneMention = '';
  if (c.color === "bleue") {
    zoneMention = ' <span style="font-size:15px;font-weight:normal;color:#007bff;">(hors département mais intervention possible)</span>';
  }
  infoPanel.innerHTML = '<div class="info-header">' + c.commune + subvention + '</div>';
  infoPanel.innerHTML += '<div class="info-subtitle">Zone: <span style="color:' + colorMap[c.color] + '; font-weight:bold;">' + zn + '</span>' + zoneMention + '</div>';

  var keys = Object.keys(tarifs),
      firstThree = keys.slice(0,3),
      treeItems = keys.filter(k=>k.toLowerCase().includes('nid dans un arbre')),
      horsItems = keys.filter(k=>String(tarifs[k]).toLowerCase().includes('hors secteur'));

  if(horsItems.length === keys.length){
    // toute la commune est hors secteur
    infoPanel.innerHTML += '<ul class="info-list"><li class="hors">! Hors secteur d\'intervention !</li></ul>';
  } else {
    infoPanel.innerHTML += '<ul class="info-list">';
    firstThree.forEach(k => { infoPanel.innerHTML += '<li><strong>' + k + '</strong>: ' + tarifs[k] + '</li>'; });
    infoPanel.innerHTML += '</ul><hr>';
    infoPanel.innerHTML += '<ul class="info-list">';
    treeItems.forEach(k => { infoPanel.innerHTML += '<li><strong>' + k + '</strong>: ' + tarifs[k] + '</li>'; });
    infoPanel.innerHTML += '</ul>';
  }
  styleTarifsRouges();

  infoPanel.innerHTML += `
    <div class="info-btn-row">
      <a href="https://destructionguepesetfrelons.organilog.com/planning" target="_blank"
        style="background:#08813e;color:#fff;font-size:21px;padding:12px 24px;border-radius:27px;border:none;
        box-shadow:0 1px 8px rgba(0,0,0,0.10);cursor:pointer;display:inline-block;text-decoration:none;">
        Consulter le planning
      </a>
      <a href="https://destructionguepesetfrelons.organilog.com/client_edit.php" target="_blank"
        style="background:#0760e5;color:#fff;font-size:21px;padding:12px 24px;border-radius:27px;border:none;
        box-shadow:0 1px 8px rgba(0,0,0,0.10);cursor:pointer;display:inline-block;text-decoration:none;">
        Ajouter le client dans Organilog
      </a>
    </div>`;
}
function styleTarifsRouges() {
  document.querySelectorAll('#info .info-list li').forEach(li => {
    li.innerHTML = li.innerHTML.replace(/(\d+[  ]?(?:€|euros))/gi, '<span style="color:red;font-weight:bold;">$1</span>');
  });
}
</script>
</body>
</html>
