<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Nos adresses à Rhodes</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <style>
    :root { --ink: #1f2937; --muted: #64748b; --line: #e6e9ef; --sea: #0d6e9c; --sea-dark: #0a4e6d; --visit: #b45309; --beach: #0284c7; --stay: #7c3aed; --practical: #0f766e; --paper: #ffffff; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); background: #dcecf4; overscroll-behavior: none; }
    #map { height: 100dvh; width: 100%; background: #dcecf4; }
    .sidebar { position: fixed; z-index: 1000; top: 22px; left: 22px; width: min(360px, calc(100vw - 44px)); max-height: calc(100dvh - 44px); overflow: auto; border-radius: 20px; background: rgba(255,255,255,.96); box-shadow: 0 16px 45px rgba(15, 23, 42, .20); backdrop-filter: blur(10px); }
    .hero { padding: 23px 23px 18px; color: white; background: linear-gradient(135deg, var(--sea-dark), var(--sea)); border-radius: 20px 20px 0 0; }
    .eyebrow { display: block; margin-bottom: 6px; font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; opacity: .78; }
    h1 { margin: 0; font-size: 26px; letter-spacing: -.035em; }
    .hero p { margin: 7px 0 0; font-size: 14px; opacity: .9; }
    .drawer-toggle { display: none; }
    .list { padding: 11px; }
    .place { display: grid; grid-template-columns: 34px 1fr; gap: 10px; width: 100%; padding: 12px; border: 0; border-radius: 13px; color: inherit; text-align: left; background: transparent; cursor: pointer; font: inherit; }
    .place:hover, .place.active { background: #f2f7fa; }
    .place:focus-visible { outline: 3px solid #60a5fa; outline-offset: 1px; }
    .pin { display: grid; place-items: center; width: 30px; height: 30px; margin-top: 1px; border-radius: 50% 50% 50% 0; color: white; font-size: 13px; font-weight: 800; transform: rotate(-45deg); box-shadow: 0 3px 9px rgba(15, 23, 42, .24); }
    .pin > span { transform: rotate(45deg); }
    .pin.visit { background: var(--visit); } .pin.beach { background: var(--beach); } .pin.stay { background: var(--stay); } .pin.practical { background: var(--practical); }
    .place strong { display: block; font-size: 14px; line-height: 1.25; }
    .place small { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; line-height: 1.3; }
    .legend { display: flex; gap: 11px; flex-wrap: wrap; padding: 3px 18px 17px; color: var(--muted); font-size: 11px; }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .legend i { width: 8px; height: 8px; border-radius: 50%; background: var(--visit); } .legend i.beach { background: var(--beach); } .legend i.stay { background: var(--stay); } .legend i.practical { background: var(--practical); }
    .leaflet-control-zoom { margin: 22px 22px 0 0 !important; border: 0 !important; box-shadow: 0 8px 20px rgba(15, 23, 42, .16) !important; }
    .leaflet-control-zoom a { width: 36px !important; height: 36px !important; line-height: 36px !important; color: var(--ink) !important; border: 0 !important; }
    .leaflet-popup-content-wrapper { border-radius: 15px; box-shadow: 0 13px 35px rgba(15, 23, 42, .22); }
    .leaflet-popup-content { width: 235px !important; margin: 15px 16px; }
    .popup-type { margin-bottom: 4px; color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    .popup-title { margin: 0; font-size: 16px; line-height: 1.2; }
    .popup-note { margin: 7px 0 12px; color: #475569; font-size: 13px; line-height: 1.4; }
    .maps-link { display: inline-block; color: var(--sea-dark); font-size: 13px; font-weight: 700; text-decoration: none; }
    .maps-link:hover { text-decoration: underline; }
    .leaflet-control-attribution { font-size: 10px !important; }
    .marker { display: grid; place-items: center; width: 34px; height: 34px; border: 3px solid white; border-radius: 50% 50% 50% 0; color: white; font-size: 14px; font-weight: 800; transform: rotate(-45deg); box-shadow: 0 4px 12px rgba(15, 23, 42, .35); }
    .marker > span { transform: rotate(45deg); }
    .marker.visit { background: var(--visit); } .marker.beach { background: var(--beach); } .marker.stay { background: var(--stay); } .marker.practical { background: var(--practical); }
    @media (max-width: 720px) {
      #map { height: 100dvh; }
      .sidebar { top: auto; right: 10px; bottom: max(10px, env(safe-area-inset-bottom)); left: 10px; width: auto; max-height: calc(100dvh - 20px); overflow: hidden; border-radius: 26px; background: rgba(255,255,255,.98); box-shadow: 0 18px 48px rgba(15, 23, 42, .25); transition: max-height .28s ease, box-shadow .28s ease; }
      .sidebar:not(.is-open) { max-height: 88px; }
      .drawer-toggle { display: grid; grid-template-columns: 30px 1fr auto; align-items: center; gap: 11px; width: 100%; min-height: 88px; padding: 12px 17px 14px; border: 0; color: var(--ink); text-align: left; background: transparent; font: inherit; cursor: pointer; }
      .drawer-toggle:focus-visible { outline: 3px solid #60a5fa; outline-offset: -3px; }
      .drawer-grip { grid-column: 1 / -1; width: 42px; height: 4px; margin: 0 auto -1px; border-radius: 99px; background: #cbd5e1; }
      .drawer-icon { display: grid; place-items: center; width: 30px; height: 30px; border-radius: 11px; color: white; background: linear-gradient(135deg, var(--sea-dark), var(--sea)); font-size: 14px; }
      .drawer-copy { min-width: 0; }
      .drawer-copy span, .drawer-copy strong { display: block; }
      .drawer-copy span { margin-bottom: 2px; color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; }
      .drawer-copy strong { overflow: hidden; font-size: 15px; line-height: 1.15; text-overflow: ellipsis; white-space: nowrap; }
      .drawer-action { color: var(--sea-dark); font-size: 13px; font-weight: 750; }
      .sidebar.is-open .drawer-toggle { min-height: 71px; border-bottom: 1px solid var(--line); }
      .sidebar.is-open .drawer-action::after { content: 'Réduire'; }
      .sidebar.is-open .drawer-action { font-size: 0; }
      .sidebar.is-open .drawer-action::after { font-size: 13px; }
      .sidebar:not(.is-open) .hero, .sidebar:not(.is-open) .list, .sidebar:not(.is-open) .legend { display: none; }
      .hero { padding: 14px 19px 15px; color: var(--ink); background: transparent; border-radius: 0; }
      .eyebrow { display: none; }
      h1 { font-size: 22px; letter-spacing: -.03em; }
      .hero p { margin-top: 4px; color: var(--muted); font-size: 13px; opacity: 1; }
      .list { max-height: calc(68dvh - 165px); padding: 7px 9px 5px; overflow: auto; overscroll-behavior: contain; }
      .place { grid-template-columns: 38px 1fr; gap: 11px; min-height: 66px; padding: 10px 11px; border-radius: 15px; }
      .place.active { background: #eaf5fa; }
      .pin { width: 32px; height: 32px; font-size: 13px; }
      .place strong { font-size: 15px; }
      .place small { margin-top: 2px; font-size: 12px; }
      .legend { gap: 8px 11px; padding: 7px 19px 17px; font-size: 11px; }
      .leaflet-control-zoom { margin: max(14px, env(safe-area-inset-top)) 14px 0 0 !important; }
      .leaflet-control-zoom a { width: 42px !important; height: 42px !important; line-height: 42px !important; font-size: 22px !important; }
      .leaflet-popup-content-wrapper { border-radius: 18px; }
      .leaflet-popup-content { width: min(245px, calc(100vw - 70px)) !important; margin: 16px; }
      .marker { width: 40px; height: 40px; border-width: 3px; font-size: 15px; }
      .leaflet-marker-icon { margin-left: -20px !important; margin-top: -40px !important; }
    }
  </style>
</head>
<body>
  <aside class="sidebar" aria-label="Lieux conseillés à Rhodes">
    <button class="drawer-toggle" id="drawer-toggle" type="button" aria-expanded="false" aria-controls="place-list">
      <span class="drawer-grip" aria-hidden="true"></span>
      <span class="drawer-icon" aria-hidden="true">⌖</span>
      <span class="drawer-copy"><span>Guide pour David</span><strong>8 adresses à Rhodes</strong></span>
      <span class="drawer-action">Explorer</span>
    </button>
    <div class="hero"><span class="eyebrow">Guide pour David</span><h1>Nos adresses à Rhodes</h1><p>Appuie sur une adresse pour la voir sur la carte.</p></div>
    <div class="list" id="place-list"></div>
    <div class="legend"><span><i class="stay"></i> Hébergement</span><span><i class="practical"></i> Pratique</span><span><i></i> Visite</span><span><i class="beach"></i> Plage</span></div>
  </aside>
  <main id="map" aria-label="Carte interactive de Rhodes"></main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const places = [
      { id: 'hotel', type: 'stay', icon: 'H', typeLabel: 'Hébergement', name: 'Rodos Princess Beach Resort & Spa', short: 'Hôtel de résidence', note: 'Hôtel de résidence.', lat: 36.05133, lng: 27.96897 },
      { id: 'car', type: 'practical', icon: 'V', typeLabel: 'Pratique', name: 'Marathon Rent A Car Kiotari', short: 'Ma recommandation pour une voiture', note: 'Ma recommandation pour une voiture : l’agence est juste à côté de votre hôtel.', lat: 36.05017, lng: 27.96919, offset: [-8, 38] },
      { id: 'monolithos', type: 'visit', icon: '1', typeLabel: 'Visite', name: 'Château de Monolithos', short: 'À faire au coucher du soleil', note: 'Le meilleur moment : en fin de journée, pour le coucher de soleil.', lat: 36.124436166667, lng: 27.726203333333 },
      { id: 'lindos', type: 'visit', icon: '2', typeLabel: 'Visite', name: 'Lindos et son acropole', short: 'À visiter tôt le matin', note: 'Partir tôt le matin pour profiter de Lindos et de l’acropole avant la chaleur et la très forte affluence.', lat: 36.0914945, lng: 28.0885055 },
      { id: 'faliraki', type: 'beach', icon: '3', typeLabel: 'Plage', name: 'Plage de Faliraki', short: 'Une des plus belles plages qu’on ait vues', note: 'Une des plus belles plages qu’on ait vues.', lat: 36.320883333333, lng: 28.207975 },
      { id: 'ladiko', type: 'beach', icon: '4', typeLabel: 'Plage', name: 'Paralia Ladikou', short: 'Une des plus belles plages qu’on ait vues', note: 'Une des plus belles plages qu’on ait vues.', lat: 36.321983333333, lng: 28.20912 },
      { id: 'kallithea', type: 'visit', icon: '5', typeLabel: 'Visite', name: 'Kallithea Springs', short: 'Très joli lieu, entrée payante', note: 'Très joli lieu, mais l’entrée est payante. Sympa à faire si vous avez le temps de passer par là.', lat: 36.37837, lng: 28.238183333333 },
      { id: 'rhodes', type: 'visit', icon: '6', typeLabel: 'Visite', name: 'Ville médiévale de Rhodes', short: 'À faire tôt le matin', note: 'Ville médiévale à faire tôt le matin pour découvrir la capitale, éviter la foule et les fortes chaleurs.', lat: 36.44362, lng: 28.228321666667 }
    ];

    const map = L.map('map', { zoomControl: false, scrollWheelZoom: true }).setView([36.18, 28.02], 10);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap contributors' }).addTo(map);
    const markers = new Map();
    const list = document.getElementById('place-list');

    function popup(place) {
      const maps = `https://www.google.com/maps/search/?api=1&query=${place.lat},${place.lng}`;
      return `<div class="popup-type">${place.typeLabel}</div><h2 class="popup-title">${place.name}</h2><p class="popup-note">${place.note}</p><a class="maps-link" href="${maps}" target="_blank" rel="noopener">Ouvrir dans Google Maps →</a>`;
    }
    const sidebar = document.querySelector('.sidebar');
    const drawerToggle = document.getElementById('drawer-toggle');
    const mobileView = window.matchMedia('(max-width: 720px)');
    function setDrawer(open) {
      sidebar.classList.toggle('is-open', open);
      drawerToggle.setAttribute('aria-expanded', String(open));
    }
    drawerToggle.addEventListener('click', () => setDrawer(!sidebar.classList.contains('is-open')));
    document.addEventListener('keydown', (event) => { if (event.key === 'Escape' && sidebar.classList.contains('is-open')) setDrawer(false); });

    function select(place, zoom = mobileView.matches ? 14 : 13) {
      map.flyTo([place.lat, place.lng], zoom, { duration: 0.7 });
      markers.get(place.id).openPopup();
      document.querySelectorAll('.place').forEach((node) => node.classList.toggle('active', node.dataset.id === place.id));
      if (mobileView.matches) setDrawer(false);
    }
    places.forEach((place) => {
      const marker = L.marker([place.lat, place.lng], { icon: L.divIcon({ className: '', html: `<div class="marker ${place.type}"><span>${place.icon}</span></div>`, iconSize: [40, 40], iconAnchor: place.offset || [20, 43], popupAnchor: [0, -40] }), zIndexOffset: place.id === 'car' ? 20 : 0 }).addTo(map).bindPopup(popup(place), { closeButton: true, autoPanPadding: [32, 145] });
      marker.on('click', () => document.querySelectorAll('.place').forEach((node) => node.classList.toggle('active', node.dataset.id === place.id)));
      markers.set(place.id, marker);
      const item = document.createElement('button');
      item.className = 'place'; item.type = 'button'; item.dataset.id = place.id;
      item.innerHTML = `<span class="pin ${place.type}"><span>${place.icon}</span></span><span><strong>${place.name}</strong><small>${place.short}</small></span>`;
      item.addEventListener('click', () => select(place));
      list.appendChild(item);
    });
    map.fitBounds(places.map((place) => [place.lat, place.lng]), { padding: [55, 55], maxZoom: 10 });
  </script>
</body>
</html>
